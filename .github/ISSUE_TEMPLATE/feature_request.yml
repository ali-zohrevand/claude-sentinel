name: Feature request
description: Suggest a new check, persona, scope, or scanner integration
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What security need isn't covered yet?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New check / OWASP-CWE mapping (security-conventions)
        - Scanner integration (scanners.md)
        - Persona / agent
        - Scope / command
        - DAST / browser testing
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This does not weaken the authorization gate or enable scanning of unauthorized targets
          required: true
